spring:
  application:
    name: applications-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/job_board_applications_db
    username: ${DB_USERNAME:human}
    password: ${DB_PASSWORD:ahmed}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    enabled: true

server:
  port: 8092

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/

feign:
  httpclient:
    hc5:
      enabled: true
    enabled: false
  okhttp:
    enabled: false
  client:
    config:
      COMPANY-OFFERS-SERVICE:
        loggerLevel: FULL


logging:
  level:
    io.github.tawdi.jobboard.applications.client.OfferServiceClient: DEBUG
