databaseChangeLog:

  - changeSet:
      id: 20260313-010
      author: tawdi
      changes:
        - createTable:
            tableName: application_messages
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: application_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: sender_user_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: sent_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: is_read
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 20260313-011
      author: tawdi
      changes:
        - addForeignKeyConstraint:
            baseTableName: application_messages
            baseColumnNames: application_id
            constraintName: fk_application_message_application
            referencedTableName: applications
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            indexName: idx_application_messages_application
            tableName: application_messages
            columns:
              - column:
                  name: application_id
        - createIndex:
            indexName: idx_application_messages_sender
            tableName: application_messages
            columns:
              - column:
                  name: sender_user_id
        - createIndex:
            indexName: idx_application_messages_sent_at
            tableName: application_messages
            columns:
              - column:
                  name: sent_at
                  descending: true

