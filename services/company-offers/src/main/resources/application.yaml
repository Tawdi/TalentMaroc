spring:
  application:
    name: company-offers-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/job_board_company_db
    username: ${DB_USERNAME:human}
    password: ${DB_PASSWORD:ahmed}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    enabled: true

server:
  port: 8091

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/