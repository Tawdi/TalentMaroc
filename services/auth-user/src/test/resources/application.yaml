spring:
  application:
    name: auth-user-service-test

  # H2 Database for testing
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # Disable Liquibase for tests
  liquibase:
    enabled: false

  # Mail Configuration (mock)
  mail:
    host: localhost
    port: 3025
    username: test
    password: test

# JWT Configuration for tests
job-board:
  jwt:
    secret-key: "dGVzdC1zZWNyZXQta2V5LWZvci10ZXN0aW5nLW9ubHktZG8tbm90LXVzZS1pbi1wcm9kdWN0aW9uLXRoaXMtaXMtYS1sb25nLXNlY3JldC1rZXk="
    expiration-ms: 3600000
    refresh-expiration-ms: 604800000

# Logging
logging:
  level:
    io.github.tawdi.jobboard: DEBUG
    org.springframework.security: DEBUG
