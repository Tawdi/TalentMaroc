            referencedColumnNames: id
            onDelete: CASCADE

  - changeSet:
      id: 1738195200001-5
      author: human
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createIndex:
            tableName: verification_tokens
            indexName: idx_verification_tokens_token
            columns:
              - column:
