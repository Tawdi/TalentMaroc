server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false  # Disable auto-routing
      global-cors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
              - "http://127.0.0.1:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders: "*"
            allowCredentials: true
            maxAge: 1800
      server:
        webmvc:
          routes:
            - id: auth-user-service
              uri: lb://AUTH-USER-SERVICE  # Exact Eureka name!
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1
            - id: candidate-profile-service
              uri: lb://CANDIDATE-PROFILE-SERVICE
              predicates:
                - Path=/candidate-profile/**
              filters:
                - StripPrefix=1
            - id: company-offers-service
              uri: lb://COMPANY-OFFERS-SERVICE
              predicates:
                - Path=/company-offers/**
              filters:
                - StripPrefix=1
            - id: applications-service
              uri: lb://APPLICATIONS-SERVICE
              predicates:
                - Path=/applications/**
              filters:
                - StripPrefix=1

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
