<div class="messages-page">
  <div class="page-header">
    <div>
      <h1><app-icon name="document" size="lg" /> Messages</h1>
      <p>Stay in touch with employers and recruiters.</p>
    </div>
  </div>

  <app-ui-card>
    <div class="empty-state">
      <div class="empty-icon"><app-icon name="document" size="xl" /></div>
      <h2>No messages yet</h2>
      <p>When employers contact you, your conversations will appear here.</p>
      <div class="actions">
        <app-ui-button variant="primary" routerLink="/jobs">
          <app-icon name="briefcase" size="sm" /> Browse Jobs
        </app-ui-button>
        <app-ui-button variant="outline" routerLink="/dashboard/profile">Update Profile</app-ui-button>
      </div>
    </div>
  </app-ui-card>
</div>
