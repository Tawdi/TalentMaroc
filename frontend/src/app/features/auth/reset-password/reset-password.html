<section class="auth-container">
  <div class="auth-card">
    <h1 class="auth-title">Reset your password</h1>
    <p class="auth-subtitle">
      Choose a new strong password for your account.
    </p>

    <form class="auth-form" (submit)="handleSubmit($event)">
      <div class="form-group">
        <label class="form-label" for="token">Reset token</label>
        <input
          id="token"
          type="text"
          class="form-input"
          [value]="token()"
          (input)="token.set($any($event.target).value)"
          placeholder="Paste the reset token from your email"
        />
        <p class="form-error" *ngIf="tokenError()">{{ tokenError() }}</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">New password</label>
        <input
          id="password"
          type="password"
          class="form-input"
          [value]="password()"
          (input)="password.set($any($event.target).value)"
          placeholder="Enter new password"
        />
        <p class="form-error" *ngIf="passwordError()">{{ passwordError() }}</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm password</label>
        <input
          id="confirmPassword"
          type="password"
          class="form-input"
          [value]="confirmPassword()"
          (input)="confirmPassword.set($any($event.target).value)"
          placeholder="Confirm new password"
        />
        <p class="form-error" *ngIf="confirmPasswordError()">{{ confirmPasswordError() }}</p>
      </div>

      <div class="auth-actions">
        <button
          app-ui-button
          type="submit"
          [disabled]="isSubmitting()"
        >
          <span *ngIf="!isSubmitting(); else loadingTpl">Reset password</span>
        </button>
      </div>
    </form>

    <ng-template #loadingTpl>
      Saving...
    </ng-template>

    <p class="auth-message success" *ngIf="statusMessage()">{{ statusMessage() }}</p>
    <p class="auth-message error" *ngIf="generalError()">{{ generalError() }}</p>

    <div class="auth-footer">
      <button app-ui-button variant="ghost" type="button" (click)="navigateToLogin()">
        Back to login
      </button>
      <button app-ui-button variant="ghost" type="button" (click)="navigateToForgot()">
        Request a new reset email
      </button>
    </div>
  </div>
</section>
